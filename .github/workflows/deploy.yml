name: CI verify and deploy

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            ann-backend/package-lock.json
            front-end/package-lock.json

      - name: Backend — install, build, verify artifacts
        working-directory: ann-backend
        run: npm ci && npm run build && npm run verify:build

      - name: Frontend — install, build, verify artifacts
        working-directory: front-end
        run: npm ci && npm run build && npm run verify:build

      - name: Frontend — Docker image (standalone + .next/static copy)
        run: docker build -f front-end/Dockerfile -t ann-frontend-ci ./front-end

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend + frontend
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -lc '
              # 🔥 LOAD NVM (CRITICAL FIX)
              export NVM_DIR="/root/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

              # use correct node version
              nvm use 22 || nvm use default

              echo "Node: $(node -v)"
              echo "NPM: $(npm -v)"
              echo "PM2: $(pm2 -v)"

              cd /var/www/America-Needs-Nursing

              # ================= BACKEND =================
              cd ann-backend
              git reset --hard
              git pull origin production
              git pull origin production
              npm install
              npm run build
              npm run verify:build
              npm run migration:run
              pm2 reload ann-backend || pm2 start npm --name ann-backend -- start

              # ================= FRONTEND =================
              cd ../front-end
              git reset --hard
              git pull origin production
              git pull origin production
              npm install
              npm run build
              npm run verify:build
              pm2 reload ann-frontend || pm2 start npm --name ann-frontend -- start -- -p 3003

              pm2 save

              # ================= NGINX =================
              sudo nginx -t && sudo systemctl restart nginx
            '
