name: Deploy Full Stack

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend + frontend
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -lc '
              # 🔥 LOAD NVM (CRITICAL FIX)
              export NVM_DIR="/root/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

              # use correct node version
              nvm use 22 || nvm use default

              echo "Node: $(node -v)"
              echo "NPM: $(npm -v)"
              echo "PM2: $(pm2 -v)"

              cd /var/www/America-Needs-Nursing

              # ================= BACKEND =================
              cd ann-backend
              git reset --hard
              git pull origin main
              npm install
              npm run build
              pm2 reload ann-backend || pm2 start npm --name ann-backend -- start

              # ================= FRONTEND =================
              cd ../front-end
              git reset --hard
              git pull origin main
              npm install
              npm run build
              pm2 reload ann-frontend || pm2 start npm --name ann-frontend -- start -- -p 3003

              pm2 save
            '