# Production-style stack: Postgres + Redis + Nest + Next + Nginx.
# 1. Copy deploy.env.example to deploy.env and fill in domains, JWT_SECRET, DATABASE_PASSWORD.
# 2. docker compose --env-file deploy.env up -d --build
# 3. Point DNS for APP_DOMAIN and API_DOMAIN to this host; open port 80 (and 443 after TLS).

name: ann-stack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in deploy.env}
      POSTGRES_DB: ${DATABASE_NAME:-ann}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  ann-backend:
    build:
      context: ./ann-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./deploy.env
    environment:
      PORT: "3000"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      UPLOADS_DIR: /app/uploads
      TRUST_PROXY: "true"
      RATE_LIMIT_TRUST_PROXY: "true"
    volumes:
      - ann_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

  ann-frontend:
    build:
      context: ./America-Need-Nurses
      dockerfile: Dockerfile
      args:
        API_UPSTREAM_URL: http://ann-backend:3000
        NEXT_PUBLIC_NEST_SOCKET_ORIGIN: ${NEXT_PUBLIC_NEST_SOCKET_ORIGIN:?set NEXT_PUBLIC_NEST_SOCKET_ORIGIN}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?set NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_ANN_CLIENT_NAME: ${NEXT_PUBLIC_ANN_CLIENT_NAME:-ann}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SOCKET_IO_UPGRADE: ${NEXT_PUBLIC_SOCKET_IO_UPGRADE:-true}
    restart: unless-stopped
    expose:
      - "3003"
    depends_on:
      - ann-backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
    depends_on:
      - ann-frontend
      - ann-backend

volumes:
  postgres_data:
  ann_uploads:
